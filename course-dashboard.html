<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard - AI Course - JohnB.io</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J6PBWMRNY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0J6PBWMRNY');
  </script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">
  <link rel="stylesheet" href="/course-dashboard.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="cd-ambient"></div>

  <main class="cd-wrap" id="cdWrap">

    <!-- Loading state -->
    <div class="cd-loading" id="cdLoading">
      <div class="cd-spinner"></div>
    </div>

    <!-- Dashboard content (hidden until auth confirmed) -->
    <div class="cd-content hidden" id="cdContent">

      <!-- Welcome header -->
      <header class="cd-header">
        <div class="cd-header-left">
          <p class="cd-greeting" id="cdGreeting">Welcome back</p>
          <h1 class="cd-name" id="cdName">Loading...</h1>
          <p class="cd-tagline">AI Course — Track your progress below</p>
        </div>
        <div class="cd-progress-ring-wrap">
          <svg class="cd-ring" viewBox="0 0 80 80" aria-hidden="true">
            <circle class="cd-ring-bg" cx="40" cy="40" r="34"/>
            <circle class="cd-ring-fill" id="cdRingFill" cx="40" cy="40" r="34"/>
          </svg>
          <div class="cd-ring-label">
            <span class="cd-ring-pct" id="cdRingPct">0%</span>
            <span class="cd-ring-sub">complete</span>
          </div>
        </div>
      </header>

      <!-- Stats bar -->
      <div class="cd-stats">
        <div class="cd-stat">
          <span class="material-symbols-outlined">check_circle</span>
          <div>
            <strong id="statLessons">0 / 35</strong>
            <span>Lessons done</span>
          </div>
        </div>
        <div class="cd-stat">
          <span class="material-symbols-outlined">layers</span>
          <div>
            <strong id="statUnits">0 / 9</strong>
            <span>Units complete</span>
          </div>
        </div>
        <div class="cd-stat">
          <span class="material-symbols-outlined">quiz</span>
          <div>
            <strong id="statExam">Not attempted</strong>
            <span>Final exam</span>
          </div>
        </div>
        <div class="cd-stat">
          <span class="material-symbols-outlined">workspace_premium</span>
          <div>
            <strong id="statCert">Locked</strong>
            <span>Certificate</span>
          </div>
        </div>
      </div>

      <!-- Resume / Exam CTA -->
      <div class="cd-cta-row" id="cdCtaRow"></div>

      <!-- Units list -->
      <section class="cd-units" id="cdUnits">
        <h2 class="cd-section-title">Course modules</h2>
        <!-- Injected by JS -->
      </section>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/scripts.js" defer></script>
  <script src="/course-data.js"></script>
  <script type="module" src="/course-dashboard.js"></script>
</body>
</html>
