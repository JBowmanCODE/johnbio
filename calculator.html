<body>
    <div id="header-placeholder"></div>
    <div class="calc-ambient"></div>

    <main class="calc-wrap">
        <h1 class="page-title">Bill <span class="gradient-text">Calculator</span></h1>
        <p class="calc-description">Split bills and calculate tips instantly</p>

        <section id="calculator">
            <div class="calculator-content">
                <div class="calc-field">
                    <label for="total_bill">Total Bill Amount (£)</label>
                    <input id="total_bill" type="number" step="0.01" placeholder="0.00" required>
                </div>
                <div class="calc-field">
                    <label for="tip_percentage">Tip Percentage (%)</label>
                    <input id="tip_percentage" type="number" step="0.1" placeholder="0" required>
                </div>
                <div class="calc-field">
                    <label for="num_people">Number of People</label>
                    <input id="num_people" type="number" placeholder="1" required>
                </div>
                <button id="calculate-button">Calculate</button>
                <div id="output" aria-live="polite"></div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/scripts.js" defer></script>
    <script src="/calculator.js" defer></script>
</body>
