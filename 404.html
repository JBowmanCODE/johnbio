<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found - JohnB.io</title>
  <meta name="robots" content="noindex, nofollow">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J6PBWMRNY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0J6PBWMRNY');
  </script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=2">
  <link rel="stylesheet" href="/header.css?v=2">
  <link rel="stylesheet" href="/footer.css?v=2">
  <style>
    .e404-ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 55% 45% at 15% 20%, rgba(255,0,127,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 80%, rgba(99,102,241,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 50% 50%, rgba(0,200,255,0.04) 0%, transparent 70%);
    }

    .e404-wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: calc(72px + 3rem) 1.5rem 5rem;
      text-align: center;
    }

    /* Glitch number */
    .e404-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(7rem, 22vw, 16rem);
      font-weight: 900;
      line-height: 1;
      color: #fff;
      position: relative;
      user-select: none;
      letter-spacing: -0.04em;
    }

    .e404-number::before,
    .e404-number::after {
      content: '404';
      position: absolute; inset: 0;
      background: transparent;
    }
    .e404-number::before {
      color: #ff007f;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      animation: glitch-top 3.5s infinite;
      left: 3px;
    }
    .e404-number::after {
      color: #6366f1;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      animation: glitch-bottom 3.5s infinite;
      left: -3px;
    }

    @keyframes glitch-top {
      0%, 90%, 100% { transform: translateX(0); opacity: 0; }
      92% { transform: translateX(-4px); opacity: 0.8; }
      94% { transform: translateX(4px); opacity: 0.8; }
      96% { transform: translateX(-2px); opacity: 0.8; }
      98% { transform: translateX(0); opacity: 0; }
    }
    @keyframes glitch-bottom {
      0%, 90%, 100% { transform: translateX(0); opacity: 0; }
      93% { transform: translateX(4px); opacity: 0.8; }
      95% { transform: translateX(-4px); opacity: 0.8; }
      97% { transform: translateX(2px); opacity: 0.8; }
      99% { transform: translateX(0); opacity: 0; }
    }

    .e404-label {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 1rem;
      background: rgba(255,0,127,0.1);
      border: 1px solid rgba(255,0,127,0.25);
      border-radius: 999px;
      font-size: 0.8rem; font-weight: 600;
      color: rgba(255,0,127,0.9);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .e404-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700; color: #fff;
      margin: 1rem 0 0.75rem;
    }

    .e404-sub {
      font-size: 1rem; color: rgba(255,255,255,0.45);
      max-width: 420px; line-height: 1.6;
      margin: 0 auto 2.5rem;
    }

    /* Terminal block */
    .e404-terminal {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.875rem;
      text-align: left;
      max-width: 460px;
      width: 100%;
      margin: 0 auto 2.5rem;
    }
    .e404-terminal-bar {
      display: flex; gap: 0.4rem; margin-bottom: 1rem;
    }
    .e404-terminal-bar span {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .e404-terminal-bar span:nth-child(1) { background: #ff5f57; }
    .e404-terminal-bar span:nth-child(2) { background: #febc2e; }
    .e404-terminal-bar span:nth-child(3) { background: #28c840; }
    .e404-line { margin: 0.2rem 0; }
    .e404-prompt { color: #ff007f; }
    .e404-cmd { color: rgba(255,255,255,0.8); }
    .e404-out { color: rgba(255,255,255,0.35); }
    .e404-err { color: #f87171; }
    .e404-cursor {
      display: inline-block; width: 8px; height: 1em;
      background: rgba(255,255,255,0.7); vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Links */
    .e404-links {
      display: flex; flex-wrap: wrap; gap: 0.75rem;
      justify-content: center;
    }
    .e404-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    }
    .e404-btn:hover { transform: translateY(-2px); }
    .e404-btn-primary {
      background: #ff007f; color: #fff;
    }
    .e404-btn-primary:hover { background: #e6006f; box-shadow: 0 4px 20px rgba(255,0,127,0.3); }
    .e404-btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75);
    }
    .e404-btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .e404-btn .material-symbols-outlined { font-size: 1.1rem; }

    /* Floating particles */
    .e404-particles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .e404-particle {
      position: absolute; border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="e404-ambient"></div>
  <div class="e404-particles" id="e404Particles"></div>

  <main class="e404-wrap">
    <div class="e404-label">
      <span class="material-symbols-outlined" style="font-size:0.9rem">error</span>
      Page not found
    </div>

    <div class="e404-number">404</div>

    <h1 class="e404-title">This page doesn't exist</h1>
    <p class="e404-sub">Even the AI couldn't find it. The URL might be wrong, the page may have moved, or it never existed.</p>

    <div class="e404-terminal">
      <div class="e404-terminal-bar">
        <span></span><span></span><span></span>
      </div>
      <div class="e404-line"><span class="e404-prompt">$ </span><span class="e404-cmd">curl https://johnb.io<span id="e404Path"></span></span></div>
      <div class="e404-line e404-out">→ Searching...</div>
      <div class="e404-line e404-err">✗ 404 Not Found</div>
      <div class="e404-line e404-out">→ No content at this path.</div>
      <div class="e404-line" style="margin-top:0.5rem"><span class="e404-prompt">$ </span><span class="e404-cursor"></span></div>
    </div>

    <div class="e404-links">
      <a href="/" class="e404-btn e404-btn-primary">
        <span class="material-symbols-outlined">home</span> Back to home
      </a>
      <a href="/news" class="e404-btn e404-btn-secondary">
        <span class="material-symbols-outlined">article</span> News
      </a>
      <a href="/lm-chat" class="e404-btn e404-btn-secondary">
        <span class="material-symbols-outlined">smart_toy</span> AI Tools
      </a>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    // Show the bad path in the terminal
    document.getElementById('e404Path').textContent = window.location.pathname;

    // Floating particles
    (function () {
      const container = document.getElementById('e404Particles');
      const colors = ['rgba(255,0,127,0.15)', 'rgba(99,102,241,0.15)', 'rgba(0,200,255,0.1)', 'rgba(255,255,255,0.05)'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'e404-particle';
        const size = Math.random() * 6 + 3;
        p.style.cssText = [
          `width:${size}px`, `height:${size}px`,
          `left:${Math.random() * 100}%`,
          `background:${colors[Math.floor(Math.random() * colors.length)]}`,
          `animation-duration:${Math.random() * 12 + 8}s`,
          `animation-delay:${Math.random() * 10}s`
        ].join(';');
        container.appendChild(p);
      }
    })();
  </script>

  <script src="/scripts.js?v=2" defer></script>
</body>
</html>
