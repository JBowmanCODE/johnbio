<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Voice - JohnB.io</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J6PBWMRNY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', { analytics_storage: 'denied' });
    gtag('js', new Date());
      gtag('config', 'G-0J6PBWMRNY');
    </script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="description" content="Convert text to voice with speed control and subtitle display.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="John Bowman">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">

    <link rel="stylesheet" href="/styles.css?v=2">
    <link rel="stylesheet" href="/header.css?v=4">
    <link rel="stylesheet" href="/footer.css?v=2">
    <link rel="stylesheet" href="/text-to-voice.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="ttv-ambient"></div>

    <main class="ttv-wrap" id="main-content">
        <h1 class="page-title">Text to <span class="gradient-text">Voice</span></h1>
        <p class="ttv-description">Paste text, pick a voice, and listen</p>

        <div class="ttv-card">
            <div class="ttv-panel-label">Your Text</div>
            <textarea id="textInput" placeholder="Paste your text here..."></textarea>
            <div class="ttv-meta">
                <span id="wordCount">Words: 0</span>
                <span id="estimatedTime">Estimated time: —</span>
            </div>

            <div class="ttv-controls">
                <div class="ttv-select-group">
                    <label for="voiceSelection">Voice</label>
                    <select id="voiceSelection"></select>
                </div>
                <div class="ttv-select-group">
                    <label for="speedControl">Speed</label>
                    <select id="speedControl">
                        <option value="1">1×</option>
                        <option value="1.2">1.2×</option>
                        <option value="1.3" selected>1.3×</option>
                        <option value="1.4">1.4×</option>
                        <option value="1.5">1.5×</option>
                        <option value="1.6">1.6×</option>
                        <option value="1.8">1.8×</option>
                    </select>
                </div>
            </div>

            <div class="ttv-buttons">
                <button id="startSpeech" disabled>
                    <span class="material-symbols-outlined">play_arrow</span>
                    Start
                </button>
                <button id="pauseSpeech">
                    <span class="material-symbols-outlined">pause</span>
                    Pause
                </button>
                <button id="stopSpeech">
                    <span class="material-symbols-outlined">stop</span>
                    Stop
                </button>
            </div>

            <p id="timeRemaining" class="ttv-time-remaining"></p>
        </div>

        <div id="subtitleDisplay" class="ttv-subtitle"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/scripts.js?v=4" defer></script>
    <script src="/text-to-voice.js" defer></script>
</body>
</html>
