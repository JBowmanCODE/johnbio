<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Worker Test</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --claude: #d4a853;
    --openai: #10a37f;
    --gemini: #4285f4;
    --text: #e8e8f0;
    --muted: #555570;
    --input-bg: #0f0f1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeDown 0.5s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo span { color: var(--muted); font-weight: 400; }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #2a2a3a;
    margin-left: auto;
    transition: background 0.3s;
  }
  .status-dot.live { background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* Broadcast bar */
  .broadcast {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    animation: fadeDown 0.5s 0.2s ease both;
  }

  .broadcast input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 16px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .broadcast input:focus { border-color: #444460; }
  .broadcast input::placeholder { color: var(--muted); }

  .btn-all {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid #333355;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-clear {
    background: transparent;
    border: 1px solid #2a1a1a;
    color: #554444;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: #aa3333; color: #ff6666; background: #1a0d0d; }
  .btn-clear:active { transform: scale(0.97); }
  .btn-all:active { transform: scale(0.97); }

  /* Chat grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    flex: 1;
    gap: 0;
    border-top: none;
    animation: fadeUp 0.5s 0.3s ease both;
    min-height: 0;
    height: calc(100vh - 130px);
  }

  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    min-height: 0;
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .panel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .panel-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .panel-model {
    font-size: 0.6rem;
    color: var(--muted);
    margin-left: auto;
  }

  .claude .panel-dot { background: var(--claude); box-shadow: 0 0 6px var(--claude); }
  .claude .panel-name { color: var(--claude); }
  .openai .panel-dot { background: var(--openai); box-shadow: 0 0 6px var(--openai); }
  .openai .panel-name { color: var(--openai); }
  .gemini .panel-dot { background: var(--gemini); box-shadow: 0 0 6px var(--gemini); }
  .gemini .panel-name { color: var(--gemini); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

  .msg-label {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .msg-bubble {
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 0.75rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: #16161f;
    border: 1px solid #222230;
    color: #aaaacc;
    align-self: flex-end;
    max-width: 90%;
  }

  .msg.assistant .msg-bubble {
    background: #0d0d16;
    border: 1px solid var(--border);
    color: var(--text);
    align-self: flex-start;
    max-width: 100%;
  }

  .msg.error .msg-bubble {
    background: #1a0d0d;
    border: 1px solid #3a1515;
    color: #ff6666;
  }

  .thinking {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 10px 12px;
  }
  .thinking span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity:0.2; } 40% { opacity:1; } }

  /* Panel input */
  .panel-input {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .panel-input textarea {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    padding: 8px 10px;
    border-radius: 4px;
    resize: none;
    outline: none;
    height: 38px;
    line-height: 1.4;
    transition: border-color 0.2s, height 0.1s;
  }
  .panel-input textarea:focus { border-color: #333350; }
  .panel-input textarea::placeholder { color: var(--muted); }

  .btn-send {
    width: 38px; height: 38px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .claude .btn-send:hover { border-color: var(--claude); color: var(--claude); }
  .openai .btn-send:hover { border-color: var(--openai); color: var(--openai); }
  .gemini .btn-send:hover { border-color: var(--gemini); color: var(--gemini); }

  @keyframes fadeDown { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:none; } }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div class="logo">AI Worker <span>// test console</span></div>
  <div id="statusDot" class="status-dot"></div>
</header>


<div class="broadcast">
  <input type="text" id="broadcastInput" placeholder="Send to all 3 models simultaneously..." />
  <button class="btn-all" onclick="sendToAll()">⬡ Send to All</button>
  <button class="btn-clear" onclick="clearAll()">✕ Clear</button>
</div>

<div class="grid">

  <!-- CLAUDE -->
  <div class="panel claude" id="panel-claude">
    <div class="panel-header">
      <div class="panel-dot"></div>
      <div class="panel-name">Claude</div>
      <div class="panel-model">claude-sonnet-4-20250514</div>
    </div>
    <div class="messages" id="msgs-claude">
      <div class="empty-state">Awaiting prompt...</div>
    </div>
    <div class="panel-input">
      <textarea id="input-claude" placeholder="Message Claude..." rows="1"
        onkeydown="handleKey(event, 'claude')"></textarea>
      <button class="btn-send" onclick="sendMessage('claude')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- OPENAI -->
  <div class="panel openai" id="panel-openai">
    <div class="panel-header">
      <div class="panel-dot"></div>
      <div class="panel-name">OpenAI</div>
      <div class="panel-model">gpt-4o-mini</div>
    </div>
    <div class="messages" id="msgs-openai">
      <div class="empty-state">Awaiting prompt...</div>
    </div>
    <div class="panel-input">
      <textarea id="input-openai" placeholder="Message OpenAI..." rows="1"
        onkeydown="handleKey(event, 'openai')"></textarea>
      <button class="btn-send" onclick="sendMessage('openai')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- GEMINI -->
  <div class="panel gemini" id="panel-gemini">
    <div class="panel-header">
      <div class="panel-dot"></div>
      <div class="panel-name">Gemini</div>
      <div class="panel-model">gemini-2.5-flash-lite</div>
    </div>
    <div class="messages" id="msgs-gemini">
      <div class="empty-state">Awaiting prompt...</div>
    </div>
    <div class="panel-input">
      <textarea id="input-gemini" placeholder="Message Gemini..." rows="1"
        onkeydown="handleKey(event, 'gemini')"></textarea>
      <button class="btn-send" onclick="sendMessage('gemini')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  const WORKER = 'https://twilight-recipe-a80f.ukjbowman.workers.dev';

  // Conversation histories per model
  const histories = { claude: [], openai: [], gemini: [] };

  function clearAll() {
    ['claude', 'openai', 'gemini'].forEach(model => {
      histories[model] = [];
      const container = document.getElementById(`msgs-${model}`);
      container.innerHTML = '<div class="empty-state">Awaiting prompt...</div>';
    });
    document.getElementById('broadcastInput').value = '';
  }

  function handleKey(e, model) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(model);
    }
  }

  function clearEmpty(model) {
    const container = document.getElementById(`msgs-${model}`);
    const empty = container.querySelector('.empty-state');
    if (empty) empty.remove();
  }

  function appendMessage(model, role, text) {
    clearEmpty(model);
    const container = document.getElementById(`msgs-${model}`);
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-label">${role === 'user' ? 'You' : model.toUpperCase()}</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function appendThinking(model) {
    clearEmpty(model);
    const container = document.getElementById(`msgs-${model}`);
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setStatus(live) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (live ? ' live' : '');
  }

  async function callClaude(prompt) {
    histories.claude.push({ role: 'user', content: prompt });
    const res = await fetch(`${WORKER}/claude`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        messages: histories.claude
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));
    const reply = data.content[0].text;
    histories.claude.push({ role: 'assistant', content: reply });
    return reply;
  }

  async function callOpenAI(prompt) {
    histories.openai.push({ role: 'user', content: prompt });
    const res = await fetch(`${WORKER}/openai`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: histories.openai
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
    const reply = data.choices[0].message.content;
    histories.openai.push({ role: 'assistant', content: reply });
    return reply;
  }

  async function callGemini(prompt) {
    // Build Gemini-format history
    const geminiHistory = histories.gemini.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));
    geminiHistory.push({ role: 'user', parts: [{ text: prompt }] });

    const res = await fetch(`${WORKER}/gemini`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gemini-2.5-flash-lite',
        contents: geminiHistory
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
    const reply = data.candidates[0].content.parts[0].text;
    histories.gemini.push({ role: 'user', content: prompt });
    histories.gemini.push({ role: 'assistant', content: reply });
    return reply;
  }

  async function sendMessage(model) {
    const input = document.getElementById(`input-${model}`);
    const prompt = input.value.trim();
    if (!prompt) return;

    input.value = '';
    appendMessage(model, 'user', prompt);
    const thinking = appendThinking(model);
    setStatus(true);

    try {
      let reply;
      if (model === 'claude') reply = await callClaude(prompt);
      else if (model === 'openai') reply = await callOpenAI(prompt);
      else reply = await callGemini(prompt);

      thinking.remove();
      appendMessage(model, 'assistant', reply);
    } catch (err) {
      thinking.remove();
      // Parse friendly message if available, otherwise show raw error
      let message = err.message;
      try {
        const parsed = JSON.parse(err.message);
        message = parsed.message || parsed.error || message;
      } catch {}
      const errDiv = document.createElement('div');
      errDiv.className = 'msg error';
      errDiv.innerHTML = `<div class="msg-label">Error</div><div class="msg-bubble">${escHtml(message)}</div>`;
      document.getElementById(`msgs-${model}`).appendChild(errDiv);
    }

    setStatus(false);
  }

  async function sendToAll() {
    const input = document.getElementById('broadcastInput');
    const prompt = input.value.trim();
    if (!prompt) return;
    input.value = '';

    // Fire all 3 in parallel
    ['claude', 'openai', 'gemini'].forEach(model => {
      document.getElementById(`input-${model}`).value = prompt;
    });
    setStatus(true);

    await Promise.allSettled([
      sendMessage('claude'),
      sendMessage('openai'),
      sendMessage('gemini')
    ]);

    setStatus(false);
  }

  // Allow Enter in broadcast input
  document.getElementById('broadcastInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); sendToAll(); }
  });
</script>
</body>
</html>
