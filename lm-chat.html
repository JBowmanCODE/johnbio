<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Chat — JohnB.io</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="description" content="Compare Claude, OpenAI and Gemini side by side in real time.">
  <meta name="robots" content="index, follow">
  <meta name="author" content="John Bowman">
  <meta property="og:title" content="LLM Chat — JohnB.io">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://johnb.io/lm-chat">
  <meta property="og:description" content="Compare Claude, OpenAI and Gemini side by side in real time.">
  <meta property="og:image" content="https://johnb.io/og_images/lm_chat_og.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="LLM Chat — JohnB.io">
  <meta name="twitter:description" content="Compare Claude, OpenAI and Gemini side by side in real time.">
  <meta name="twitter:image" content="https://johnb.io/og_images/lm_chat_og.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">
  <link rel="stylesheet" href="/lm-chat.css">
</head>
<body>

<div id="header-placeholder"></div>
<div class="ambient"></div>

<div class="chat-layout">

  <!-- Hero -->
  <div class="chat-hero">
    <h1>LLM <span class="gradient-text">Chat</span></h1>
    <p>Compare Claude, OpenAI &amp; Gemini side by side</p>
  </div>

  <!-- Broadcast bar -->
  <div class="broadcast-card">
    <input type="text" id="broadcastInput" placeholder="Send to all 3 models simultaneously..." />
    <button class="btn-broadcast" onclick="sendToAll()">
      <span class="material-symbols-outlined">send</span>
      Send to All
    </button>
    <button class="btn-clear-all" onclick="clearAll()" title="Clear all conversations">
      <span class="material-symbols-outlined">delete_sweep</span>
    </button>
  </div>

  <!-- Panels -->
  <div class="panels-grid">

    <!-- CLAUDE -->
    <div class="panel panel-claude" id="panel-claude">
      <div class="panel-header">
        <div class="panel-indicator"></div>
        <span class="panel-name">Claude</span>
        <span class="panel-model">claude-sonnet-4-20250514</span>
      </div>
      <div class="messages" id="msgs-claude">
        <div class="empty-state">Awaiting prompt...</div>
      </div>
      <div class="panel-input">
        <textarea id="input-claude" placeholder="Message Claude..." rows="1"
          onkeydown="handleKey(event, 'claude')"></textarea>
        <button class="btn-send" onclick="sendMessage('claude')" title="Send">
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
    </div>

    <!-- OPENAI -->
    <div class="panel panel-openai" id="panel-openai">
      <div class="panel-header">
        <div class="panel-indicator"></div>
        <span class="panel-name">OpenAI</span>
        <span class="panel-model">gpt-4o-mini</span>
      </div>
      <div class="messages" id="msgs-openai">
        <div class="empty-state">Awaiting prompt...</div>
      </div>
      <div class="panel-input">
        <textarea id="input-openai" placeholder="Message OpenAI..." rows="1"
          onkeydown="handleKey(event, 'openai')"></textarea>
        <button class="btn-send" onclick="sendMessage('openai')" title="Send">
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
    </div>

    <!-- GEMINI -->
    <div class="panel panel-gemini" id="panel-gemini">
      <div class="panel-header">
        <div class="panel-indicator"></div>
        <span class="panel-name">Gemini</span>
        <span class="panel-model">gemini-2.5-flash-lite</span>
      </div>
      <div class="messages" id="msgs-gemini">
        <div class="empty-state">Awaiting prompt...</div>
      </div>
      <div class="panel-input">
        <textarea id="input-gemini" placeholder="Message Gemini..." rows="1"
          onkeydown="handleKey(event, 'gemini')"></textarea>
        <button class="btn-send" onclick="sendMessage('gemini')" title="Send">
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
    </div>

  </div>
</div>

<div id="share-bar-placeholder"></div>
    <div id="footer-placeholder"></div>

<script src="/scripts.js" defer></script>
<script>
  const WORKER = 'https://twilight-recipe-a80f.ukjbowman.workers.dev';

  const histories = { claude: [], openai: [], gemini: [] };

  function clearAll() {
    ['claude', 'openai', 'gemini'].forEach(model => {
      histories[model] = [];
      const container = document.getElementById(`msgs-${model}`);
      container.innerHTML = '<div class="empty-state">Awaiting prompt...</div>';
    });
    document.getElementById('broadcastInput').value = '';
  }

  function handleKey(e, model) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(model);
    }
  }

  function clearEmpty(model) {
    const container = document.getElementById(`msgs-${model}`);
    const empty = container.querySelector('.empty-state');
    if (empty) empty.remove();
  }

  function appendMessage(model, role, text) {
    clearEmpty(model);
    const container = document.getElementById(`msgs-${model}`);
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = role === 'user' ? 'You' : model.charAt(0).toUpperCase() + model.slice(1);
    div.innerHTML = `
      <div class="msg-label">${label}</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function appendThinking(model) {
    clearEmpty(model);
    const container = document.getElementById(`msgs-${model}`);
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function callClaude(prompt) {
    histories.claude.push({ role: 'user', content: prompt });
    const res = await fetch(`${WORKER}/claude`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        messages: histories.claude
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));
    const reply = data.content[0].text;
    histories.claude.push({ role: 'assistant', content: reply });
    return reply;
  }

  async function callOpenAI(prompt) {
    histories.openai.push({ role: 'user', content: prompt });
    const res = await fetch(`${WORKER}/openai`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: histories.openai
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
    const reply = data.choices[0].message.content;
    histories.openai.push({ role: 'assistant', content: reply });
    return reply;
  }

  async function callGemini(prompt) {
    const geminiHistory = histories.gemini.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));
    geminiHistory.push({ role: 'user', parts: [{ text: prompt }] });

    const res = await fetch(`${WORKER}/gemini`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gemini-2.5-flash-lite',
        contents: geminiHistory
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
    const reply = data.candidates[0].content.parts[0].text;
    histories.gemini.push({ role: 'user', content: prompt });
    histories.gemini.push({ role: 'assistant', content: reply });
    return reply;
  }

  async function sendMessage(model) {
    const input = document.getElementById(`input-${model}`);
    const prompt = input.value.trim();
    if (!prompt) return;

    input.value = '';
    appendMessage(model, 'user', prompt);
    const thinking = appendThinking(model);

    try {
      let reply;
      if (model === 'claude') reply = await callClaude(prompt);
      else if (model === 'openai') reply = await callOpenAI(prompt);
      else reply = await callGemini(prompt);

      thinking.remove();
      appendMessage(model, 'assistant', reply);
    } catch (err) {
      thinking.remove();
      let message = err.message;
      try {
        const parsed = JSON.parse(err.message);
        message = parsed.message || parsed.error || message;
      } catch {}
      const errDiv = document.createElement('div');
      errDiv.className = 'msg error';
      errDiv.innerHTML = `<div class="msg-label">Error</div><div class="msg-bubble">${escHtml(message)}</div>`;
      document.getElementById(`msgs-${model}`).appendChild(errDiv);
    }
  }

  async function sendToAll() {
    const input = document.getElementById('broadcastInput');
    const prompt = input.value.trim();
    if (!prompt) return;
    input.value = '';

    ['claude', 'openai', 'gemini'].forEach(model => {
      document.getElementById(`input-${model}`).value = prompt;
    });

    await Promise.allSettled([
      sendMessage('claude'),
      sendMessage('openai'),
      sendMessage('gemini')
    ]);
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('broadcastInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); sendToAll(); }
    });
  });
</script>
</body>
</html>
