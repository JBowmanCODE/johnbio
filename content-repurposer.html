<head>
    <meta charset="UTF-8">

    <meta name="twitter:title" content="Content Repurposer — JohnB.io">
    <meta name="twitter:description" content="Repurpose any content into LinkedIn, X, Facebook, newsletter and video scripts instantly.">
    <meta name="twitter:image" content="https://johnb.io/images/content-repurposer.webp">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">

    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/header.css">
    <link rel="stylesheet" href="/footer.css">
    <link rel="stylesheet" href="/content-repurposer.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="repurposer-ambient"></div>

    <main class="repurposer-wrap">
        <h1 class="page-title">Content <span class="gradient-text">Repurposer</span></h1>
        <p class="repurposer-desc">Paste any content and get it rewritten for every channel instantly</p>

        <!-- Input section -->
        <div class="repurposer-input-section">
            <textarea id="content-input" placeholder="Paste your blog post, article, press release or any content here..."></textarea>
            <div class="platform-selector" id="platform-selector">
                <span class="platform-selector-label">Generate for:</span>
                <div class="platform-btns">
                    <button class="platform-btn" data-platform="all">All</button>
                    <button class="platform-btn active" data-platform="linkedin"><span class="material-symbols-outlined">work</span>LinkedIn</button>
                    <button class="platform-btn" data-platform="twitter"><span class="material-symbols-outlined">tag</span>X</button>
                    <button class="platform-btn" data-platform="facebook"><span class="material-symbols-outlined">groups</span>Facebook</button>
                    <button class="platform-btn" data-platform="newsletter"><span class="material-symbols-outlined">email</span>Newsletter</button>
                    <button class="platform-btn" data-platform="video_10s"><span class="material-symbols-outlined">videocam</span>10s Script</button>
                    <button class="platform-btn" data-platform="video_30s"><span class="material-symbols-outlined">smart_display</span>30s Script</button>
                </div>
            </div>
            <div class="input-footer">
                <span id="char-count">0 / 10,000</span>
                <button id="repurpose-btn">
                    <span class="material-symbols-outlined">auto_awesome</span>
                    Repurpose Content
                </button>
            </div>
        </div>

        <!-- Results grid (hidden until results arrive) -->
        <div class="repurposer-grid" id="repurposer-grid" style="display:none;">

            <div class="output-card" data-key="linkedin">
                <div class="output-card-header">
                    <div class="output-card-label">
                        <span class="material-symbols-outlined">work</span>
                        LinkedIn Post
                    </div>
                    <span class="output-badge" id="badge-linkedin"></span>
                </div>
                <div class="output-content" id="output-linkedin"></div>
                <div class="output-card-footer">
                    <button class="share-btn" data-target="linkedin" data-platform="linkedin">
                        <span class="material-symbols-outlined">open_in_new</span>
                        Post to LinkedIn
                    </button>
                    <button class="copy-btn" data-target="linkedin">
                        <span class="material-symbols-outlined">content_copy</span>
                        Copy
                    </button>
                </div>
            </div>

            <div class="output-card" data-key="twitter">
                <div class="output-card-header">
                    <div class="output-card-label">
                        <span class="material-symbols-outlined">tag</span>
                        X Post
                    </div>
                    <span class="output-badge" id="badge-twitter"></span>
                </div>
                <div class="output-content" id="output-twitter"></div>
                <div class="output-card-footer">
                    <button class="share-btn" data-target="twitter" data-platform="twitter">
                        <span class="material-symbols-outlined">open_in_new</span>
                        Post to X
                    </button>
                    <button class="copy-btn" data-target="twitter">
                        <span class="material-symbols-outlined">content_copy</span>
                        Copy
                    </button>
                </div>
            </div>

            <div class="output-card" data-key="facebook">
                <div class="output-card-header">
                    <div class="output-card-label">
                        <span class="material-symbols-outlined">groups</span>
                        Facebook Post
                    </div>
                    <span class="output-badge" id="badge-facebook"></span>
                </div>
                <div class="output-content" id="output-facebook"></div>
                <div class="output-card-footer">
                    <button class="copy-btn" data-target="facebook">
                        <span class="material-symbols-outlined">content_copy</span>
                        Copy
                    </button>
                </div>
            </div>

            <div class="output-card" data-key="newsletter">
                <div class="output-card-header">
                    <div class="output-card-label">
                        <span class="material-symbols-outlined">email</span>
                        Newsletter
                    </div>
                    <span class="output-badge" id="badge-newsletter"></span>
                </div>
                <div class="output-content" id="output-newsletter"></div>
                <div class="output-card-footer">
                    <button class="copy-btn" data-target="newsletter">
                        <span class="material-symbols-outlined">content_copy</span>
                        Copy
                    </button>
                </div>
            </div>

            <div class="output-card" data-key="video_10s">
                <div class="output-card-header">
                    <div class="output-card-label">
                        <span class="material-symbols-outlined">videocam</span>
                        10-Second Script
                    </div>
                    <span class="output-badge" id="badge-video_10s"></span>
                </div>
                <div class="output-content" id="output-video_10s"></div>
                <div class="output-card-footer">
                    <button class="copy-btn" data-target="video_10s">
                        <span class="material-symbols-outlined">content_copy</span>
                        Copy
                    </button>
                </div>
            </div>

            <div class="output-card" data-key="video_30s">
                <div class="output-card-header">
                    <div class="output-card-label">
                        <span class="material-symbols-outlined">smart_display</span>
                        30-Second Script
                    </div>
                    <span class="output-badge" id="badge-video_30s"></span>
                </div>
                <div class="output-content" id="output-video_30s"></div>
                <div class="output-card-footer">
                    <button class="copy-btn" data-target="video_30s">
                        <span class="material-symbols-outlined">content_copy</span>
                        Copy
                    </button>
                </div>
            </div>

        </div>
    </main>

    <div id="share-bar-placeholder"></div>
    <div id="footer-placeholder"></div>

    <script src="/scripts.js" defer></script>
    <script src="/content-repurposer.js" defer></script>
</body>
</html>
