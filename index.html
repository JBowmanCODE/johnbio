    <style>
      /* Home page only — does not affect header or footer */
      .home-hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
        padding: 2rem 1.25rem;
        width: 100%;
      }

      .home-hero .hero-card {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 1rem;
        padding: 3rem 3.5rem;
        max-width: 36rem;
        width: 100%;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.3),
          0 1px 0 rgba(255, 255, 255, 0.1) inset;
        animation: fadeUp 0.6s ease both;
      }

      .home-hero .hero-icon {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        display: block;
        animation: pulse 3s ease-in-out infinite;
      }

      .home-hero .hero-title {
        font-family: 'Inter', 'Roboto', sans-serif;
        font-size: clamp(1.1rem, 3vw, 1.4rem);
        font-weight: 400;
        color: rgba(255, 255, 255, 0.92);
        letter-spacing: 0.02em;
        line-height: 1.6;
        margin: 0;
      }

      .home-hero .hero-divider {
        width: 3rem;
        height: 2px;
        background: linear-gradient(90deg, #62d9ff, #4c3bcf);
        border: none;
        border-radius: 1px;
        margin: 1.5rem auto;
        opacity: 0.7;
      }

      .home-hero .hero-tags {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 0.25rem;
      }

      .home-hero .hero-tag {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #62d9ff;
        background: rgba(98, 217, 255, 0.1);
        border: 1px solid rgba(98, 217, 255, 0.25);
        border-radius: 2rem;
        padding: 0.25rem 0.75rem;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(1.5rem); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.08); }
      }

      @media (max-width: 48rem) {
        .home-hero .hero-card {
          padding: 2rem 1.5rem;
        }
      }
    </style>
