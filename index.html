<body>

  <div class="ambient"></div>

  <div id="header-placeholder"></div>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="hero-text">
        <h1>
          <span class="word-1">Latest</span>
          <span class="word-2">Projects</span>
        </h1>
        <p class="hero-sub"><span class="code-var">site_reason</span> <span class="code-op">=</span> <span class="code-bracket">[</span><span class="code-str">"AI"</span><span class="code-punct">,</span> <span class="code-str">"Test Site"</span><span class="code-punct">,</span> <span class="code-str">"Playground"</span><span class="code-bracket">]</span> <span class="data-pulse"></span></p>
      </div>
      <div class="hero-news" id="heroNews" aria-label="Latest news"></div>
    </section>

    <!-- Filters -->
    <div class="filters-row">
      <button class="filter-btn active" data-filter="all">All Projects</button>
      <button class="filter-btn" data-filter="ai">AI Projects</button>
      <button class="filter-btn" data-filter="dev">Dev Tools</button>
      <button class="filter-btn" data-filter="rai">Responsible AI</button>
      <button class="filter-btn" data-filter="digital">Digital AI</button>
      <div class="search-wrap">
        <span class="material-symbols-outlined">search</span>
        <input class="search-input" id="searchInput" placeholder="Search projects..." type="text">
      </div>
    </div>

    <div class="results-meta" id="resultsMeta"></div>

    <!-- Grid -->
    <div class="projects-grid" id="projectsGrid">
      <div class="empty-state" id="emptyState">
        <span class="material-symbols-outlined">search_off</span>
        <h3>No projects found</h3>
        <p>Try a different search or filter.</p>
      </div>
    </div>

    <!-- Show More -->
    <div class="show-more-wrap" id="showMoreWrap">
      <button class="show-more-btn" id="showMoreBtn">
        <span class="material-symbols-outlined" aria-hidden="true">expand_more</span>
        <span id="showMoreLabel">Show more</span>
      </button>
    </div>
  </main>

  <button id="back-to-top" aria-label="Back to top">
    <span class="material-symbols-outlined">arrow_upward</span>
  </button>

  <div id="footer-placeholder"></div>

  <script src="/news-data.js"></script>
  <script src="/scripts.js" defer></script>
  <script src="/index.js" defer></script>

  <script>
    const btt = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      btt.classList.toggle('visible', window.scrollY > 300);
    }, { passive: true });
    btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>

  <script>
    (function () {
      const w1 = document.querySelector('.word-1');
      const w2 = document.querySelector('.word-2');
      if (!w1 || !w2) return;

      let idleTimer;
      let isIdle = false;

      function swap(el, newText) {
        el.style.transition = 'opacity 0.35s ease';
        el.style.opacity = '0';
        setTimeout(() => {
          el.textContent = newText;
          el.style.opacity = '1';
        }, 350);
      }

      function goIdle() {
        if (isIdle) return;
        isIdle = true;
        swap(w1, 'Wake');
        swap(w2, 'Up');
      }

      function goActive() {
        if (!isIdle) return;
        isIdle = false;
        swap(w1, 'Latest');
        swap(w2, 'Projects');
      }

      function resetTimer() {
        clearTimeout(idleTimer);
        goActive();
        idleTimer = setTimeout(goIdle, 15000);
      }

      document.addEventListener('mousemove', resetTimer, { passive: true });
      idleTimer = setTimeout(goIdle, 15000);
    })();
  </script>
