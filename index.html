<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JohnB.io | AI Projects Gallery</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J6PBWMRNY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0J6PBWMRNY');

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">
  <link rel="stylesheet" href="/index.css">

  <!-- SEO -->
  <meta name="description" content="JohnB.IO - An AI and development platform for testing and exploring cutting-edge artificial intelligence technologies.">
  <meta name="keywords" content="AI, artificial intelligence, machine learning, development, programming, API integration, prompt engineering, data visualization">
  <meta name="robots" content="index, follow">
  <meta name="author" content="John Bowman">
  <meta property="og:title" content="JohnB.IO - John Bowman AI Projects">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://johnb.io">
  <meta property="og:description" content="See my latest AI Python and JS Projects.">
  <meta property="og:image" content="https://johnb.io/og_images/johnb_homepage_og.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="JohnB.IO - AI and Development Platform">
  <meta name="twitter:description" content="Explore cutting-edge AI technologies and development tools at JohnB.IO.">
  <meta name="twitter:image" content="https://johnb.io/og_images/johnb_homepage_og.webp">
</head>
<body>

  <div class="ambient"></div>

  <div id="header-placeholder"></div>

  <main>
    <!-- Hero -->
    <section class="hero">
      <h1>
        <span class="word-1">Latest</span>
        <span class="word-2">Projects</span>
      </h1>
      <p class="hero-sub"><span class="code-var">site_reason</span> <span class="code-op">=</span> <span class="code-bracket">[</span><span class="code-str">"AI"</span><span class="code-punct">,</span> <span class="code-str">"Test Site"</span><span class="code-punct">,</span> <span class="code-str">"Playground"</span><span class="code-bracket">]</span> <span class="data-pulse"></span></p>
    </section>

    <!-- Filters -->
    <div class="filters-row">
      <button class="filter-btn active" data-filter="all">All Projects</button>
      <button class="filter-btn" data-filter="ai">AI Projects</button>
      <button class="filter-btn" data-filter="dev">Dev Tools</button>
      <button class="filter-btn" data-filter="rai">Responsible AI</button>
      <div class="search-wrap">
        <span class="material-symbols-outlined">search</span>
        <input class="search-input" id="searchInput" placeholder="Search projects..." type="text">
      </div>
    </div>

    <div class="results-meta" id="resultsMeta"></div>

    <!-- Grid -->
    <div class="projects-grid" id="projectsGrid">
      <div class="empty-state" id="emptyState">
        <span class="material-symbols-outlined">search_off</span>
        <h3>No projects found</h3>
        <p>Try a different search or filter.</p>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/scripts.js" defer></script>
  <script src="/index.js" defer></script>

</body>
</html>
