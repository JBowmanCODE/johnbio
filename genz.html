<body>
    <div id="header-placeholder"></div>
    <div class="genz-ambient"></div>

    <main class="genz-wrap">
        <h1 class="page-title">Gen Z <span class="gradient-text">Translator</span></h1>
        <p class="genz-description">Turn your text into certified no-cap Gen Z slang fr fr</p>

        <div class="genz-section">
            <div class="genz-panel">
                <div class="genz-panel-label" id="input-label">Your Text</div>
                <textarea id="input-text" placeholder="Paste your text here..."></textarea>
                <div class="genz-controls">
                    <input type="file" id="file-upload" accept=".txt,.doc,.docx">
                    <label for="file-upload" class="file-label">
                        <span class="material-symbols-outlined">upload_file</span> Choose File
                    </label>
                    <button id="translate-btn">
                        <span class="material-symbols-outlined">translate</span>
                        Translate
                    </button>
                </div>
            </div>

            <div class="genz-arrow">
                <button id="swap-btn" title="Switch to Gen Z → English">
                    <span class="material-symbols-outlined">swap_horiz</span>
                </button>
            </div>

            <div class="genz-panel genz-panel-output">
                <div class="genz-panel-label" id="output-label">Gen Z Translation</div>
                <div id="output-text"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/scripts.js" defer></script>
    <script src="/genz.js" defer></script>
</body>
